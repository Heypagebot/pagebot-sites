<!DOCTYPE html>
<html lang="ml">
  <style id="pagebot-visibility-fix">
    /* Force all content visible with correct contrast */
    body, body * {
      opacity: 1 !important;
      visibility: visible !important;
    }
    body {
      background-color: #ffffff !important;
      color: #1a1a1a !important;
    }
    p, li, td, th, label {
      color: #1a1a1a !important;
    }
    h1, h2, h3, h4, h5, h6 {
      color: #111111 !important;
    }
    /* Hero always white text */
    .hero h1, .hero p, .hero span,
    #hero h1, #hero p, #hero span,
    [class*="hero"] h1, [class*="hero"] p {
      color: #ffffff !important;
    }
    /* Dark sections white text */
    .testimonials *, #testimonials *,
    [class*="testimonial"] *,
    footer *, .footer * {
      color: #ffffff !important;
    }
    /* Buttons always white text */
    button, .btn, a.btn,
    [class*="btn"], [class*="button"] {
      color: #ffffff !important;
    }
    /* Cards solid white */
    .card, .product-card, .menu-card, .service-card,
    [class*="card"] {
      background-color: #ffffff !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
    }
    /* Nav links on dark bg */
    .navbar:not(.scrolled) a,
    .nav:not(.scrolled) a,
    nav:not(.scrolled) a {
      color: #ffffff !important;
    }
    /* Nav links on white bg */
    .navbar.scrolled a,
    .nav.scrolled a {
      color: #1a1a1a !important;
    }
  </style>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puttu Cafe - കാസർഗോഡിന്റെ സ്വന്തം പുട്ട് രുചികൾ</title>
    <meta name="description" content="കാസർഗോഡിലെ Puttu Cafe, പരമ്പരാഗത പുട്ടിന്റെ തനിമയും ആധുനിക രുചികളും സമന്വയിപ്പിച്ച് നിങ്ങൾക്ക് വ്യത്യസ്തമായൊരു അനുഭവം നൽകുന്നു.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Poppins:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        /* CRITICAL RULES: COLOR CONTRAST & VISIBILITY */
        :root {
            --primary-color: #E55C00; /* Dominant color from logo - a warm orange */
            --primary-dark-start: #C04B00; /* Darker shade for hero gradient start */
            --primary-dark-end: #A03A00;   /* Even darker shade for hero gradient end */
            --text-color: #1a1a1a;
            --white-color: #ffffff;
            --light-bg: #f8f8f8;
            --dark-bg: #1a1a1a;
            --whatsapp-color: #25D366;
            --box-shadow-light: 0 4px 12px rgba(0, 0, 0, 0.08);
            --box-shadow-hover: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        /* Basic Reset & Body Styling */
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Poppins', sans-serif;
            line-height: 1.6;
            color: var(--text-color);
            background: var(--white-color);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a {
            text-decoration: none;
            color: var(--primary-color);
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--primary-dark-start);
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: 'Montserrat', sans-serif;
            color: var(--text-color);
            margin-bottom: 0.8em;
            line-height: 1.2;
        }

        h1 { font-size: 3rem; }
        h2 { font-size: 2.5rem; }
        h3 { font-size: 2rem; }
        h4 { font-size: 1.5rem; }

        @media (max-width: 768px) {
            h1 { font-size: 2.2rem; }
            h2 { font-size: 1.8rem; }
            h3 { font-size: 1.5rem; }
        }

        p {
            margin-bottom: 1em;
        }

        /* Utility Classes */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .section-padding {
            padding: 6rem 0;
        }

        .text-center {
            text-align: center;
        }

        .text-white {
            color: var(--white-color) !important;
        }

        .bg-white { background-color: var(--white-color); }
        .bg-light { background-color: var(--light-bg); }
        .bg-dark { background-color: var(--dark-bg); }

        .btn {
            display: inline-block;
            padding: 0.9rem 2.2rem;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            white-space: nowrap;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: var(--white-color);
        }

        .btn-primary:hover {
            background-color: var(--primary-dark-start);
            transform: translateY(-4px);
            box-shadow: var(--box-shadow-hover);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--white-color);
            border: 2px solid var(--white-color);
        }

        .btn-secondary:hover {
            background-color: var(--white-color);
            color: var(--primary-color);
            transform: translateY(-4px);
            box-shadow: var(--box-shadow-hover);
        }
        
        .btn-whatsapp {
            background-color: var(--whatsapp-color);
            color: var(--white-color);
            padding: 0.8rem 1.8rem;
            font-size: 0.95rem;
        }
        .btn-whatsapp:hover {
            background-color: #1DA851; /* Darker green */
            transform: translateY(-4px);
            box-shadow: var(--box-shadow-hover);
        }

        /* Fixed Navigation Bar */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            z-index: 1000;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
            padding: 1rem 0;
            background-color: transparent;
        }

        .navbar.scrolled {
            background-color: var(--white-color);
            box-shadow: var(--box-shadow-light);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-brand {
            display: flex;
            align-items: center;
            font-family: 'Montserrat', sans-serif;
            font-weight: 800;
            font-size: 1.6rem;
            color: var(--text-color);
        }
        .navbar-brand img {
            height: 48px;
            width: auto;
            object-fit: contain;
            margin-right: 10px;
        }
        #nav-text-logo {
            display: none; /* Hidden by default, shown if image fails */
            font-weight:800;
            font-size:1.4rem;
        }


        .nav-links {
            list-style: none;
            display: flex;
            gap: 2.5rem;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            color: var(--text-color);
            font-weight: 500;
            font-size: 1.05rem;
            position: relative;
        }
        .nav-links a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: -5px;
            width: 0;
            height: 2px;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }
        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-whatsapp {
            display: flex;
            align-items: center;
            margin-left: 2rem;
        }

        .hamburger {
            display: none;
            flex-direction: column;
            cursor: pointer;
            padding: 5px;
            z-index: 1001;
        }

        .hamburger span {
            display: block;
            width: 25px;
            height: 3px;
            background-color: var(--text-color);
            margin: 4px 0;
            transition: all 0.3s ease;
        }

        .hamburger.active span:nth-child(1) {
            transform: translateY(7px) rotate(45deg);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: translateY(-7px) rotate(-45deg);
        }

        /* Mobile Navigation */
        @media (max-width: 992px) {
            .nav-links {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100vh;
                background-color: var(--white-color);
                justify-content: center;
                align-items: center;
                gap: 2rem;
                transform: translateX(100%);
                transition: transform 0.4s ease-in-out;
                box-shadow: var(--box-shadow-light);
            }

            .nav-links.active {
                transform: translateX(0);
            }

            .nav-links a {
                color: var(--text-color);
                font-size: 1.5rem;
            }

            .hamburger {
                display: flex;
            }

            .nav-whatsapp {
                display: none; /* Hide WhatsApp button in mobile nav */
            }
            .navbar.scrolled .nav-whatsapp { /* Ensure it stays hidden even if nav is scrolled */
                display: none;
            }
        }
        @media (max-width: 480px) {
            .navbar-brand img {
                height: 40px;
            }
            .navbar-brand {
                font-size: 1.3rem;
            }
        }


        /* Hero Section */
        .hero {
            position: relative;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: var(--white-color);
            overflow: hidden;
            background: linear-gradient(135deg, var(--primary-dark-start), var(--primary-dark-end));
        }

        .hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('data:image/svg+xml,%3Csvg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"%3E%3Cg fill="none" fill-rule="evenodd"%3E%3Cg fill="%23FFFFFF" fill-opacity="0.05"%3E%3Cpath d="M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z"%3E%3C/path%3E%3C/g%3E%3C/g%3E%3C/svg%3E'); /* Subtle pattern */
            opacity: 0.1;
            z-index: 1;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 800px;
        }

        .hero-content h1 {
            font-size: 4.8rem;
            font-weight: 800;
            margin-bottom: 0.2em;
            color: var(--white-color);
            text-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }

        .hero-content p {
            font-size: 1.4rem;
            margin-bottom: 2.5rem;
            font-weight: 500;
        }

        .hero-buttons .btn {
            margin: 0 1rem;
        }

        .hero-logo {
            margin-bottom: 1.5rem;
        }
        .hero-logo img {
            height: 80px;
            width: auto;
            object-fit: contain;
        }
        .hero-logo #hero-text-logo {
            display: none; /* Hidden by default */
            font-weight:800;
            font-size:2.5rem;
            color: var(--white-color);
        }
        @media (max-width: 768px) {
            .hero-content h1 {
                font-size: 3rem;
            }
            .hero-content p {
                font-size: 1.1rem;
            }
            .hero-buttons .btn {
                display: block;
                margin: 1rem auto;
            }
            .hero-logo img {
                height: 60px;
            }
            .hero-logo #hero-text-logo {
                font-size: 2rem;
            }
        }
        @media (max-width: 480px) {
            .hero-content h1 {
                font-size: 2.5rem;
            }
            .hero-content p {
                font-size: 1rem;
            }
        }

        /* Animated Blobs */
        .blob {
            position: absolute;
            background: var(--white-color);
            opacity: 0.15;
            border-radius: 50%;
            filter: blur(50px);
            animation: blob-move 15s infinite ease-in-out alternate;
            z-index: 0;
        }

        .blob:nth-child(1) { width: 150px; height: 150px; top: 10%; left: 5%; animation-delay: 0s; }
        .blob:nth-child(2) { width: 200px; height: 200px; bottom: 15%; right: 10%; animation-delay: 4s; }
        .blob:nth-child(3) { width: 180px; height: 180px; top: 30%; right: 20%; animation-delay: 8s; }
        .blob:nth-child(4) { width: 220px; height: 220px; bottom: 5%; left: 25%; animation-delay: 12s; }

        @keyframes blob-move {
            0% { transform: translate(0, 0) scale(1); }
            25% { transform: translate(20px, -20px) scale(1.1); }
            50% { transform: translate(-30px, 30px) scale(0.9); }
            75% { transform: translate(10px, 40px) scale(1.2); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Bounce Arrow */
        .scroll-arrow {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 30px;
            border-bottom: 3px solid var(--white-color);
            border-right: 3px solid var(--white-color);
            transform: translateX(-50%) rotate(45deg);
            animation: bounce 2s infinite;
            cursor: pointer;
            z-index: 2;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {
                transform: translateX(-50%) rotate(45deg) translateY(0);
            }
            40% {
                transform: translateX(-50%) rotate(45deg) translateY(-10px);
            }
            60% {
                transform: translateX(-50%) rotate(45deg) translateY(-5px);
            }
        }

        /* About Section */
        .about .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 3rem;
            align-items: center;
        }

        .about-stats {
            display: flex;
            justify-content: space-around;
            margin-top: 3rem;
            flex-wrap: wrap;
        }

        .stat-card {
            background-color: var(--white-color);
            padding: 1.5rem;
            border-radius: 10px;
            box-shadow: var(--box-shadow-light);
            text-align: center;
            flex: 1;
            min-width: 200px;
            margin: 1rem;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--box-shadow-hover);
        }

        .stat-card h3 {
            font-size: 2.5rem;
            color: var(--primary-color);
            margin-bottom: 0.2em;
        }

        .stat-card p {
            font-weight: 500;
            color: var(--text-color);
            margin: 0;
        }

        @media (max-width: 768px) {
            .about .grid-2 {
                grid-template-columns: 1fr;
                text-align: center;
            }
            .about-image {
                order: -1; /* Image above text on mobile */
                margin-bottom: 2rem;
            }
            .about-image img {
                max-width: 80%;
                height: auto;
            }
            .stat-card {
                flex-basis: calc(50% - 2rem); /* Two cards per row on smaller screens */
            }
        }
        @media (max-width: 480px) {
            .stat-card {
                flex-basis: 100%; /* One card per row on very small screens */
            }
        }


        /* Products/Services Section (Menu) */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .menu-item-card {
            background-color: var(--white-color);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: var(--box-shadow-light);
            text-align: center;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .menu-item-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--box-shadow-hover);
        }

        .menu-item-card .emoji {
            font-size: 3rem;
            margin-bottom: 0.8rem;
        }

        .menu-item-card h4 {
            font-size: 1.6rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .menu-item-card p {
            font-size: 0.95rem;
            color: #555;
            margin-bottom: 1rem;
        }

        .menu-item-card .price {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-color);
            margin-bottom: 1.5rem;
            display: block;
        }

        /* Testimonials Section */
        .testimonials {
            background: linear-gradient(135deg, var(--primary-dark-start), var(--primary-dark-end));
            color: var(--white-color);
            text-align: center;
        }

        .testimonials h2, .testimonials p {
            color: var(--white-color);
        }

        .testimonial-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .testimonial-card {
            background-color: rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 10px;
            box-shadow: var(--box-shadow-light);
            color: var(--white-color);
            text-align: left;
            transition: transform 0.3s ease, background-color 0.3s ease;
        }

        .testimonial-card:hover {
            transform: translateY(-8px);
            background-color: rgba(255, 255, 255, 0.2);
        }

        .testimonial-card .stars {
            color: #FFD700; /* Gold color for stars */
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .testimonial-card p {
            font-style: italic;
            margin-bottom: 1.5rem;
            color: var(--white-color);
        }

        .testimonial-card .customer-name {
            font-weight: 600;
            color: var(--white-color);
            font-size: 1.1rem;
        }

        /* FAQ Section */
        .faq-accordion {
            max-width: 800px;
            margin: 3rem auto 0;
        }

        .faq-item {
            margin-bottom
