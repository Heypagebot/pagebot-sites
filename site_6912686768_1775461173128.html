<style id="pagebot-fix">
    /* ── PAGEBOT FIX: Force visibility and contrast ── */
    
    /* Force all content visible */
    body, body * {
      opacity: 1 !important;
      visibility: visible !important;
    }
    
    /* White body background */
    body {
      background-color: #ffffff !important;
      color: #1a1a1a !important;
    }
    
    /* Force dark text on all elements */
    p, span, li, td, th, label, div {
      color: #1a1a1a !important;
    }
    
    h1, h2, h3, h4, h5, h6 {
      color: #111111 !important;
    }
    
    /* Fix glassmorphism cards — make them solid white */
    [style*="backdrop-filter"],
    [style*="glass"],
    .glass,
    .glassmorphism {
      background: #ffffff !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      border: 1px solid #e0e0e0 !important;
    }
    
    /* Fix cards with transparent backgrounds */
    .card, .menu-card, .service-card, .product-card, .item-card,
    [class*="card"], [class*="-card"], [class*="item"] {
      background-color: #ffffff !important;
      backdrop-filter: none !important;
      -webkit-backdrop-filter: none !important;
      color: #1a1a1a !important;
      border: 1px solid #eeeeee !important;
      box-shadow: 0 4px 20px rgba(0,0,0,0.08) !important;
    }
    
    /* Fix cards text */
    .card *, .menu-card *, .service-card *, .product-card *,
    [class*="card"] *, [class*="item"] * {
      color: #1a1a1a !important;
    }
    
    /* Keep buttons their own color */
    button, .btn, a.btn, [class*="btn"], [class*="button"] {
      color: #ffffff !important;
    }
    
    /* Keep dark sections with white text */
    section[style*="background-color: #"],
    .dark-section, .dark, [class*="dark"],
    footer {
      color: #ffffff !important;
    }
    
    .dark-section *, .dark *, [class*="dark"] *, footer * {
      color: #ffffff !important;
    }
    
    /* Fix hero text contrast */
    .hero h1, .hero-content h1, #hero h1,
    [class*="hero"] h1 {
      color: #111111 !important;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.1) !important;
    }
    
    .hero p, .hero-content p, #hero p,
    [class*="hero"] p {
      color: #333333 !important;
    }
    
    /* Fix nav links */
    nav a, .nav-links a, .navbar a {
      color: #1a1a1a !important;
    }
    
    /* Animations only for blobs */
    *:not([class*="blob"]):not([class*="float"]):not(.scroll-indicator):not([class*="bounce"]) {
      animation-fill-mode: none !important;
    }

    /* Testimonial section fix */
    #testimonials, .testimonials, [class*="testimonial"] {
      color: #ffffff !important;
    }
    #testimonials *, .testimonials *, [class*="testimonial"] * {
      color: #ffffff !important;
    }
    #testimonials .customer-name, .testimonials .customer-name {
      color: #ffcc80 !important;
    }

    /* Stat numbers keep brand color */
    .stat-card .number, [class*="stat"] .number,
    [class*="count"], [class*="stat-number"] {
      color: inherit !important;
    }
  </style>
  <script>
    // Force all elements visible immediately
    (function fix() {
      var els = document.querySelectorAll('*');
      for (var i = 0; i < els.length; i++) {
        var el = els[i];
        var s = window.getComputedStyle(el);
        if (s.opacity === '0') el.style.setProperty('opacity','1','important');
        if (s.visibility === 'hidden') el.style.setProperty('visibility','visible','important');
        // Fix rgba transparent backgrounds on cards
        if (s.backgroundColor && s.backgroundColor.includes('rgba') && s.backgroundColor.includes('0.0')) {
          el.style.setProperty('background-color','#ffffff','important');
        }
        if (s.backgroundColor && s.backgroundColor.includes('rgba') && s.backgroundColor.includes('0.1')) {
          var tag = el.tagName.toLowerCase();
          if (tag === 'div' || tag === 'article' || tag === 'section') {
            el.style.setProperty('background-color','#ffffff','important');
          }
        }
      }
    })();
    document.addEventListener('DOMContentLoaded', function() {
      var els = document.querySelectorAll('*');
      for (var i = 0; i < els.length; i++) {
        var el = els[i];
        var s = window.getComputedStyle(el);
        if (s.opacity === '0') el.style.setProperty('opacity','1','important');
        if (s.visibility === 'hidden') el.style.setProperty('visibility','visible','important');
      }
    });
