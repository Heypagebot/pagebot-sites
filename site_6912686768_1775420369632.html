<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Puttu Project - Authentic & Innovative Puttu Cafe in Kasaragod</title>
    <meta name="description" content="Puttu Project - Your go-to cafe in Kasaragod for a delightful range of Puttu varieties, from savory Chicken and Beef to unique Chocolate Puttu.">
    <link rel="icon" href="https://lirrjoolbuhwpgvdlntc.supabase.co/storage/v1/object/public/logos/logo_6912686768_1775420280995.jpg" type="image/jpeg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');

        :root {
            --primary-color: #E76F51; /* Terracotta Orange */
            --secondary-color: #F4A261; /* Soft Orange */
            --accent-color: #2A9D8F; /* Deep Teal */
            --dark-text: #264653; /* Rich Dark Blue/Charcoal */
            --light-bg: #FDF4E3; /* Creamy Off-White */
            --glass-bg: rgba(255, 255, 255, 0.15);
            --glass-border: rgba(255, 255, 255, 0.3);
            --whatsapp-green: #25D366;
            --font-heading: 'Montserrat', sans-serif;
            --font-body: 'Poppins', sans-serif;
            --shadow-light: 0 4px 15px rgba(0, 0, 0, 0.1);
            --shadow-heavy: 0 8px 30px rgba(0, 0, 0, 0.2);
            --border-radius-lg: 15px;
            --border-radius-md: 10px;
        }

        /* Base Styles */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html {
            scroll-behavior: smooth;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body {
            font-family: var(--font-body);
            line-height: 1.6;
            color: var(--dark-text);
            background-color: var(--light-bg);
            overflow-x: hidden;
        }

        h1, h2, h3, h4, h5, h6 {
            font-family: var(--font-heading);
            color: var(--dark-text);
            line-height: 1.2;
            margin-bottom: 0.5em;
        }

        a {
            text-decoration: none;
            color: var(--primary-color);
            transition: color 0.3s ease;
        }

        a:hover {
            color: var(--secondary-color);
        }

        img {
            max-width: 100%;
            height: auto;
            display: block;
        }

        p {
            margin-bottom: 1em;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.8rem 1.8rem;
            border-radius: var(--border-radius-md);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            transition: all 0.3s ease;
            cursor: pointer;
            border: none;
            font-size: 0.95rem;
            white-space: nowrap;
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
            box-shadow: var(--shadow-light);
        }

        .btn-primary:hover {
            background-color: var(--secondary-color);
            box-shadow: var(--shadow-heavy);
            transform: translateY(-2px);
        }

        .btn-secondary {
            background-color: transparent;
            color: var(--dark-text);
            border: 2px solid var(--dark-text);
            box-shadow: var(--shadow-light);
        }

        .btn-secondary:hover {
            background-color: var(--dark-text);
            color: var(--light-bg);
            box-shadow: var(--shadow-heavy);
            transform: translateY(-2px);
        }

        .btn-whatsapp {
            background-color: var(--whatsapp-green);
            color: white;
            box-shadow: var(--shadow-light);
        }

        .btn-whatsapp:hover {
            background-color: #20b05b;
            box-shadow: var(--shadow-heavy);
            transform: translateY(-2px);
        }

        /* Section Styling */
        section {
            padding: 6rem 0;
            position: relative;
            overflow: hidden;
            z-index: 1; /* Ensure content is above abstract shapes */
        }

        .section-heading {
            text-align: center;
            font-size: clamp(2rem, 5vw, 3.5rem);
            margin-bottom: 3rem;
            position: relative;
            z-index: 2;
            color: var(--dark-text);
        }
        
        .section-heading span {
            color: var(--primary-color);
        }

        /* Navigation */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            padding: 1rem 0;
            z-index: 1000;
            transition: background-color 0.4s ease, box-shadow 0.4s ease;
            backdrop-filter: blur(0);
            background-color: transparent;
        }

        .navbar.scrolled {
            background-color: rgba(255, 255, 255, 0.9);
            box-shadow: var(--shadow-light);
            backdrop-filter: blur(10px);
        }

        .navbar .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .navbar-logo {
            display: flex;
            align-items: center;
        }

        .navbar-logo img {
            height: 48px;
            width: auto;
            object-fit: contain;
        }

        #nav-text-logo {
            font-weight: 800;
            font-size: 1.4rem;
            color: var(--dark-text);
            display: none; /* Hidden by default, shown by onerror */
        }

        .nav-links {
            display: flex;
            list-style: none;
            gap: 2.5rem;
            margin: 0;
        }

        .nav-links a {
            color: var(--dark-text);
            font-weight: 500;
            position: relative;
            padding: 0.5rem 0;
        }

        .nav-links a::after {
            content: '';
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background-color: var(--primary-color);
            transition: width 0.3s ease;
        }

        .nav-links a:hover::after {
            width: 100%;
        }

        .nav-cta {
            margin-left: 2rem;
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0.5rem;
            z-index: 1001;
        }

        .hamburger-icon {
            display: block;
            width: 25px;
            height: 3px;
            background-color: var(--dark-text);
            margin: 5px 0;
            transition: all 0.3s ease;
        }

        .hamburger.active .hamburger-icon:nth-child(1) {
            transform: translateY(8px) rotate(45deg);
        }

        .hamburger.active .hamburger-icon:nth-child(2) {
            opacity: 0;
        }

        .hamburger.active .hamburger-icon:nth-child(3) {
            transform: translateY(-8px) rotate(-45deg);
        }

        @media (max-width: 992px) {
            .nav-links, .nav-cta {
                display: none;
            }
            .hamburger {
                display: block;
            }
            .nav-links.active {
                display: flex;
                flex-direction: column;
                position: absolute;
                top: 0;
                right: 0;
                width: 70%;
                height: 100vh;
                background-color: rgba(255, 255, 255, 0.95);
                backdrop-filter: blur(15px);
                padding: 6rem 2rem;
                align-items: flex-end;
                gap: 1.5rem;
                box-shadow: -5px 0 15px rgba(0, 0, 0, 0.1);
                animation: slideIn 0.4s forwards;
            }
            .nav-links.active .nav-cta {
                display: block;
                margin-top: 1rem;
            }
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
        }

        /* Hero Section */
        #hero {
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
            color: white;
            padding: 2rem 1.5rem;
            background: linear-gradient(135deg, var(--primary-color) 0%, var(--secondary-color) 100%);
            overflow: hidden;
        }

        #hero::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at top left, var(--secondary-color) 0%, transparent 50%),
                        radial-gradient(circle at bottom right, var(--primary-color) 0%, transparent 50%);
            opacity: 0.6;
            z-index: 0;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 900px;
        }

        .hero-logo img {
            height: 80px;
            width: auto;
            object-fit: contain;
            margin-bottom: 1.5rem;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.2));
        }

        #hero h1 {
            font-size: clamp(3rem, 8vw, 7rem);
            color: white;
            margin-bottom: 0.2em;
            text-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            font-weight: 900;
        }

        #hero .tagline {
            font-style: italic;
            font-size: clamp(1.1rem, 2.5vw, 1.8rem);
            margin-bottom: 2.5rem;
            opacity: 0.9;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
            font-weight: 300;
        }

        .hero-actions {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .hero-actions .btn {
            border: 2px solid white;
            color: white;
        }

        .hero-actions .btn-whatsapp {
            background-color: var(--whatsapp-green);
            border-color: var(--whatsapp-green);
        }

        .hero-actions .btn-secondary {
            background-color: transparent;
            color: white;
        }
        .hero-actions .btn-secondary:hover {
            color: var(--primary-color);
            background-color: white;
        }

        .scroll-indicator {
            position: absolute;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%);
            width: 30px;
            height: 50px;
            border: 2px solid white;
            border-radius: 20px;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding-top: 5px;
            z-index: 2;
        }

        .scroll-indicator::after {
            content: '';
            width: 8px;
            height: 8px;
            background-color: white;
            border-radius: 50%;
            animation: scroll-bounce 1.5s infinite ease-in-out;
        }

        @keyframes scroll-bounce {
            0%, 20%, 50%, 80%, 100% { transform: translateY(0); opacity: 1; }
            40% { transform: translateY(15px); opacity: 0.7; }
            60% { transform: translateY(5px); opacity: 0.8; }
        }

        /* Abstract Blobs for Hero */
        .blob {
            position: absolute;
            opacity: 0.15;
            background-color: white;
            border-radius: 50%;
            filter: blur(80px); /* Increased blur for a softer effect */
            z-index: 1;
        }
        .blob:nth-child(1) {
            width: 300px; height: 300px;
            top: 10%; left: 5%;
            animation: float1 15s infinite ease-in-out;
        }
        .blob:nth-child(2) {
            width: 400px; height: 400px;
            bottom: 15%; right: 10%;
            animation: float2 18s infinite ease-in-out;
        }
        .blob:nth-child(3) {
            width: 250px; height: 250px;
            top: 30%; right: 20%;
            animation: float3 16s infinite ease-in-out;
        }
        .blob:nth-child(4) {
            width: 350px; height: 350px;
            bottom: 5%; left: 20%;
            animation: float4 20s infinite ease-in-out;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-20px, 30px) scale(1.05); }
        }
        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(25px, -20px) scale(0.98); }
        }
        @keyframes float3 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(15px, 25px) scale(1.02); }
        }
        @keyframes float4 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-30px, -15px) scale(0.95); }
        }

        /* About Section */
        #about {
            background-color: var(--light-bg);
            text-align: center;
            position: relative;
        }

        #about::before, #about::after {
            content: '';
            position: absolute;
            background-color: var(--secondary-color);
            opacity: 0.1;
            border-radius: 50%;
            filter: blur(70px);
            z-index: 0;
        }
        #about::before {
            width: 400px; height: 400px;
            top: -10%; left: -10%;
        }
        #about::after {
            width: 300px; height: 300px;
            bottom: -5%; right: -5%;
            background-color: var(--primary-color);
        }

        #about .container {
            position: relative;
            z-index: 1;
        }

        .about-content {
            max-width: 800px;
            margin: 0 auto 3rem auto;
            font-size: 1.15rem;
            color: var(--dark-text);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 2rem;
            margin-top: 3rem;
        }

        .stat-item {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            padding: 2rem 1.5rem;
            box-shadow: var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .stat-item:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-heavy);
        }

        .stat-item .number {
            font-size: 3.5rem;
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 0.2em;
            font-family: var(--font-heading);
        }

        .stat-item .label {
            font-size: 1.2rem;
            font-weight: 500;
            color: var(--dark-text);
        }

        /* Products/Menu Section */
        #menu {
            background-color: #F8F1E7; /* Slightly darker cream */
            position: relative;
        }

        #menu::before, #menu::after {
            content: '';
            position: absolute;
            background-color: var(--accent-color);
            opacity: 0.08;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
        }
        #menu::before {
            width: 500px; height: 500px;
            top: 5%; right: -15%;
        }
        #menu::after {
            width: 350px; height: 350px;
            bottom: 0%; left: -10%;
            background-color: var(--secondary-color);
        }

        .menu-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2.5rem;
            position: relative;
            z-index: 1;
        }

        .menu-card {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            border-radius: var(--border-radius-lg);
            padding: 2rem;
            text-align: center;
            box-shadow: var(--shadow-light);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .menu-card:hover {
            transform: translateY(-8px);
            box-shadow: var(--shadow-heavy);
        }

        .menu-card .emoji {
            font-size: 3rem;
            margin-bottom: 1rem;
        }

        .menu-card h3 {
            font-size: 1.8rem;
            color: var(--primary-color);
            margin-bottom: 0.5rem;
        }

        .menu-card p {
            font-size: 1rem;
            color: var(--dark-text);
            margin-bottom: 1.5rem;
            flex-grow: 1; /* Allows text to take up available space */
        }

        .menu-card .price {
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--accent-color);
            margin-bottom: 1.5rem;
        }

        /* Testimonials Section */
        #testimonials {
            background: linear-gradient(135deg, var(--dark-text) 0%, #3a5b6c 100%);
            color: white;
            padding: 8rem 0;
            position: relative;
            overflow: hidden;
        }

        #testimonials::before {
            content: '“';
            font-family: serif;
            position: absolute;
            top: 1rem;
            left: 50%;
            transform: translateX(-50%);
            font-size: 15rem;
            color: rgba(255,
