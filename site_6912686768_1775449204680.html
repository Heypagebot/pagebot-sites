<style id="pagebot-force-visible">
    /* Pagebot: Force all content visible */
    body, body * {
      opacity: 1 !important;
      visibility: visible !important;
    }
    /* Allow transforms only for decorative blobs */
    *:not([class*="blob"]):not([class*="float"]):not([class*="shape"]) {
      animation-fill-mode: none !important;
    }
    /* Keep nav and sections fully visible */
    nav, header, section, footer, main, .hero, .about, .services, .products, .contact, .faq, .testimonials {
      opacity: 1 !important;
      visibility: visible !important;
    }
    /* Keep all text visible */
    h1, h2, h3, h4, h5, h6, p, span, a, li, td, th, button, label {
      opacity: 1 !important;
      visibility: visible !important;
    }
    /* Keep cards and grid items visible */
    .card, .item, [class*="card"], [class*="item"], [class*="grid"] > * {
      opacity: 1 !important;
      visibility: visible !important;
    }
  </style>
  <script>
    // Pagebot: Force all elements visible on load
    document.addEventListener('DOMContentLoaded', function() {
      document.querySelectorAll('*').forEach(function(el) {
        var computed = window.getComputedStyle(el);
        if (computed.opacity === '0') {
          el.style.setProperty('opacity', '1', 'important');
        }
        if (computed.visibility === 'hidden') {
          el.style.setProperty('visibility', 'visible', 'important');
        }
      });
    });
    // Also run immediately
    setTimeout(function() {
      document.querySelectorAll('*').forEach(function(el) {
        var computed = window.getComputedStyle(el);
        if (computed.opacity === '0') el.style.setProperty('opacity', '1', 'important');
        if (computed.visibility === 'hidden') el.style.setProperty('visibility', 'visible', 'important');
      });
    }, 100);
